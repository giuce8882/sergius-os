<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LiquidTodo" />
  <link rel="apple-touch-icon" href="/pwa-icon-512.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>LiquidTodo</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '10px';
      div.style.left = '10px';
      div.style.right = '10px';
      div.style.backgroundColor = 'rgba(255, 0, 0, 0.9)';
      div.style.color = 'white';
      div.style.padding = '20px';
      div.style.zIndex = '999999';
      div.style.borderRadius = '10px';
      div.style.fontFamily = 'monospace';
      div.innerHTML = `<h3>🚨 LiquidTodo Runtime Crash</h3><p><b>Error:</b> ${message}</p><pre style="white-space: pre-wrap;">${error ? error.stack : 'No stack trace available.'}</pre>`;
      document.body.appendChild(div);
    };
    window.addEventListener('unhandledrejection', function (event) {
      window.onerror('Unhandled Promise Rejection: ' + event.reason, null, null, null, event.reason);
    });
  </script>
</body>

</html>
